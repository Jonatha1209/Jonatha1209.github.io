<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 파일 선택</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        select {
            padding: 8px;
            font-size: 16px;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>HTML 페이지 선택</h2>
    <label for="fileSelect">페이지를 선택하세요:</label>
    <select id="fileSelect">
        <option value="">페이지 선택</option>
        <option value="./folders/자리뽑기.html">자리</option>
    </select>
    <br>
    <button onclick="navigateToFile()">선택한 페이지 열기</button>
</div>

<script>
    function navigateToFile() {
        const selectedFile = document.getElementById('fileSelect').value;
        
        if (selectedFile) {
            window.location.href = selectedFile; 
        } else {
            alert('페이지를 선택하세요!');
        }
    }
</script>

</body>
</html>
